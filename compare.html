<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AeroSim — Compare</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
/* shared_inline.css — paste into every page's <style> block */

:root {
  --bg: #07090d;
  --bg2: #0c1018;
  --bg3: #111820;
  --panel: #090d13;
  --border: rgba(0,210,255,0.10);
  --border2: rgba(0,210,255,0.22);
  --acc: #00d2ff;
  --acc2: #00ff9d;
  --acc3: #ff6b35;
  --warn: #ffd166;
  --heat: #ff4500;
  --text: #c8dde8;
  --text2: #4a6a7a;
  --text3: #1e3040;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Syne', sans-serif;
  --nav-h: 48px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 12px; display: flex; flex-direction: column; overflow: hidden; }

/* TOP NAV */
.topnav {
  height: var(--nav-h);
  flex-shrink: 0;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 0;
  z-index: 100;
}
.nav-brand {
  font-family: var(--sans);
  font-weight: 800;
  font-size: 15px;
  color: var(--acc);
  letter-spacing: .06em;
  margin-right: 28px;
  white-space: nowrap;
}
.nav-brand span { color: var(--text2); font-weight: 400; font-size: 10px; margin-left: 6px; }
.nav-links { display: flex; gap: 2px; flex: 1; }
.nav-link {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 5px;
  text-decoration: none;
  color: var(--text2);
  font-size: 10px;
  letter-spacing: .06em;
  text-transform: uppercase;
  transition: all .15s;
  border: 1px solid transparent;
  white-space: nowrap;
}
.nav-link svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.nav-link:hover { color: var(--text); background: rgba(0,210,255,.05); border-color: var(--border); }
.nav-link.active { color: var(--acc); background: rgba(0,210,255,.09); border-color: var(--border2); }

/* PAGE SHELL */
.page { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
  flex-shrink: 0;
}
.page-title { font-family: var(--sans); font-weight: 800; font-size: 15px; color: var(--text); }
.page-title span { color: var(--acc); }
.page-body { flex: 1; overflow-y: auto; padding: 18px 20px; }
.page-body::-webkit-scrollbar { width: 3px; }
.page-body::-webkit-scrollbar-thumb { background: var(--border2); }

/* CARDS */
.card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
.card-title {
  font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--text2); margin-bottom: 11px;
  display: flex; align-items: center; gap: 5px;
}
.card-title::before { content: ''; display: inline-block; width: 2px; height: 9px; background: var(--acc); border-radius: 2px; }
.card-title.heat::before { background: var(--heat); }
.card-title.ok::before { background: var(--acc2); }
.card-title.warn::before { background: var(--warn); }

/* BADGES */
.badge { padding: 2px 8px; border-radius: 3px; font-size: 8px; letter-spacing: .1em; text-transform: uppercase; font-weight: 600; display: inline-block; }
.badge.run  { background: rgba(0,255,157,.1); color: var(--acc2); border: 1px solid rgba(0,255,157,.25); }
.badge.stop { background: rgba(255,107,53,.1); color: var(--acc3); border: 1px solid rgba(255,107,53,.25); }
.badge.cmp  { background: rgba(0,210,255,.1); color: var(--acc); border: 1px solid rgba(0,210,255,.25); }
.badge.warn { background: rgba(255,209,102,.1); color: var(--warn); border: 1px solid rgba(255,209,102,.25); }

/* BUTTONS */
.btn { padding: 7px 14px; border-radius: 5px; border: 1px solid var(--border2); background: transparent; color: var(--text); cursor: pointer; font-family: var(--mono); font-size: 10px; letter-spacing: .07em; text-transform: uppercase; transition: all .15s; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
.btn:hover { background: rgba(0,210,255,.07); border-color: var(--acc); color: var(--acc); }
.btn.primary { background: rgba(0,255,157,.1); color: var(--acc2); border-color: rgba(0,255,157,.3); }
.btn.primary:hover { background: rgba(0,255,157,.18); }
.btn.danger { background: rgba(255,107,53,.08); color: var(--acc3); border-color: rgba(255,107,53,.25); }
.btn.danger:hover { background: rgba(255,107,53,.16); }
.btn.sm { padding: 4px 10px; font-size: 9px; }

/* FORM ELEMENTS */
input[type=range] { width: 100%; -webkit-appearance: none; height: 2px; background: var(--bg3); border-radius: 2px; outline: none; cursor: pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 11px; height: 11px; border-radius: 50%; background: var(--acc); cursor: pointer; }
input[type=range]::-webkit-slider-runnable-track { background: linear-gradient(to right, var(--acc) var(--p,50%), var(--bg3) var(--p,50%)); height: 2px; border-radius: 2px; }
input[type=range].hs::-webkit-slider-thumb { background: var(--heat); }
input[type=range].hs::-webkit-slider-runnable-track { background: linear-gradient(to right, var(--heat) var(--p,50%), var(--bg3) var(--p,50%)); }
input[type=text], input[type=number], select, textarea { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--mono); font-size: 11px; padding: 6px 10px; outline: none; transition: border-color .15s; width: 100%; }
input:focus, select:focus, textarea:focus { border-color: var(--acc); }
select option { background: var(--bg2); }

/* UPLOAD ZONE */
.upload-zone { border: 1px dashed rgba(0,210,255,.25); border-radius: 7px; padding: 22px 16px; text-align: center; cursor: pointer; transition: all .2s; background: rgba(0,210,255,.02); }
.upload-zone:hover, .upload-zone.drag { border-color: var(--acc); background: rgba(0,210,255,.06); }
.upload-zone input { display: none; }

/* TABLE */
.data-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.data-table th { text-align: left; font-size: 8px; letter-spacing: .1em; text-transform: uppercase; color: var(--text2); padding: 6px 10px; border-bottom: 1px solid var(--border); }
.data-table td { padding: 7px 10px; border-bottom: 1px solid rgba(0,210,255,.05); color: var(--text); }
.data-table tr:hover td { background: rgba(0,210,255,.03); }

/* METRIC BOX */
.mbox { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 9px 12px; }
.mbox-lbl { font-size: 8px; text-transform: uppercase; letter-spacing: .1em; color: var(--text2); margin-bottom: 2px; }
.mbox-val { font-size: 19px; font-family: var(--sans); font-weight: 700; color: var(--acc); line-height: 1.1; }
.mbox-val.ok { color: var(--acc2); } .mbox-val.hot { color: var(--heat); } .mbox-val.warn { color: var(--warn); }
.mbox-unit { font-size: 9px; color: var(--text2); margin-top: 1px; }
.mbar-w { margin-top: 5px; height: 2px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.mbar { height: 100%; border-radius: 2px; background: var(--acc); transition: width .35s; }
.mbar.d { background: var(--acc3); } .mbar.h { background: var(--heat); } .mbar.w { background: var(--warn); } .mbar.ok { background: var(--acc2); }

::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

body{overflow:auto;}
.cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:11px;margin-bottom:13px;}
.cc{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:13px;position:relative;}
.cc.best{border-color:var(--acc2);}
.bb{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:var(--acc2);color:#040d06;font-size:8px;letter-spacing:.07em;text-transform:uppercase;padding:2px 8px;border-radius:2px;font-weight:700;white-space:nowrap;}
.cn{font-family:var(--sans);font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;}
.cs{font-size:9px;color:var(--text2);margin-bottom:9px;}
.cr{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(0,210,255,.05);font-size:10px;}
.cr:last-child{border:none;}
.cl{color:var(--text2);}.cv{color:var(--text);}
.cv.bv{color:var(--acc2);font-weight:600;}.cv.wv{color:var(--acc3);}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:3px;border:1px solid var(--border);background:var(--bg3);font-size:9px;color:var(--text2);cursor:pointer;transition:all .12s;margin:2px;}
.chip:hover,.chip.on{border-color:var(--acc);color:var(--acc);background:rgba(0,210,255,.07);}
.chip .xb{color:var(--acc3);margin-left:3px;font-size:11px;}
.cw{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:13px;}
</style>
</head>
<body>
<div class="page">
<div class="page-header">
  <div class="page-title"><span>Aero</span>Sim &mdash; Compare</div>
  <div style="font-size:10px;color:var(--text2);">Select up to 6 parts</div>
</div>
<div class="page-body">
  <div class="card" style="margin-bottom:13px;">
    <div class="card-title">Select parts</div>
    <div id="allChips" style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:6px;"></div>
    <div style="font-size:9px;color:var(--text2);">Selected: <span id="selCnt">0</span> / 6</div>
  </div>
  <div class="cg" id="cmpGrid"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px;">
    <div class="cw"><div class="card-title">Aerodynamic metrics</div><canvas id="barCv" height="130" style="width:100%;display:block;"></canvas></div>
    <div class="cw"><div class="card-title heat">Thermal metrics</div><canvas id="heatCv" height="130" style="width:100%;display:block;"></canvas></div>
  </div>
  <div class="cw" style="margin-bottom:0;">
    <div class="card-title">L/D vs Cd scatter (lower-left = better)</div>
    <canvas id="scatCv" height="110" style="width:100%;display:block;"></canvas>
  </div>
</div>
</div>
<script>
const DB_KEY='aerosim_parts';
const Store={
  getAll(){try{return JSON.parse(localStorage.getItem(DB_KEY)||'[]');}catch{return [];}},
  save(p){localStorage.setItem(DB_KEY,JSON.stringify(p));window.dispatchEvent(new Event('aerosim:update'));},
  addResult(r){const p=this.getAll();r.id=r.id||(Date.now().toString(36)+Math.random().toString(36).slice(2,6));r.createdAt=r.createdAt||Date.now();p.unshift(r);this.save(p);return r;},
  deleteById(id){this.save(this.getAll().filter(p=>p.id!==id));},
  getById(id){return this.getAll().find(p=>p.id===id)||null;},
  getBaseNames(){return[...new Set(this.getAll().map(p=>(p.name||'unnamed').replace(/_v\d+$/i,'')))];},
  getBestByBase(){const m={};this.getAll().forEach(p=>{const b=(p.name||'unnamed').replace(/_v\d+$/i,'');if(!m[b]||(p.Cd!==undefined&&p.Cd<m[b].Cd))m[b]=p;});return Object.values(m);},
  seedDemo(){if(this.getAll().length>0)return;const d=[
    {name:'wing_v1',shape:'airfoil',speed:60,aoa:3,den:1.225,Cd:0.042,Cl:0.48,LD:11.4,Nu:124,Tmax:55,qpp:820,Re:4100,Mach:0.176,stag:2205,notes:'Baseline NACA0012'},
    {name:'wing_v2',shape:'airfoil',speed:60,aoa:5,den:1.225,Cd:0.038,Cl:0.61,LD:16.1,Nu:138,Tmax:58,qpp:910,Re:4100,Mach:0.176,stag:2205,notes:'Increased camber'},
    {name:'wing_v3',shape:'airfoil',speed:60,aoa:8,den:1.225,Cd:0.051,Cl:0.79,LD:15.5,Nu:150,Tmax:63,qpp:1020,Re:4100,Mach:0.176,stag:2205,notes:'High AoA test'},
    {name:'body_v1',shape:'car',speed:40,aoa:0,den:1.225,Cd:0.31,Cl:0.04,LD:0.1,Nu:98,Tmax:72,qpp:1240,Re:2700,Mach:0.118,stag:980,notes:'Car body baseline'},
    {name:'body_v2',shape:'car',speed:40,aoa:0,den:1.225,Cd:0.27,Cl:0.03,LD:0.1,Nu:102,Tmax:69,qpp:1180,Re:2700,Mach:0.118,stag:980,notes:'Rounded nose fairing'},
    {name:'probe_v1',shape:'sphere',speed:25,aoa:0,den:1.225,Cd:0.47,Cl:0.01,LD:0.02,Nu:78,Tmax:48,qpp:640,Re:1700,Mach:0.074,stag:383,notes:'Blunt probe body'},
  ].map((d,i)=>({...d,id:'demo'+i,createdAt:Date.now()-(6-i)*86400000}));
  this.save(d);}
};
const fmt3=v=>(v===undefined||v===null||isNaN(v))?'—':(+v).toFixed(3);
const fmt1=v=>(v===undefined||v===null||isNaN(v))?'—':(+v).toFixed(1);
const fmtI=v=>(v===undefined||v===null||isNaN(v))?'—':Math.round(+v).toLocaleString();
Store.seedDemo();


function buildNav(active){
  const pages=[
    {href:'index.html',label:'Dashboard',icon:'<polyline points="3 9 12 2 21 9"/><path d="M9 22V12h6v10"/><rect x="3" y="9" width="18" height="13" rx="1"/>'},
    {href:'simulate.html',label:'Simulate',icon:'<circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>'},
    {href:'parts.html',label:'Parts',icon:'<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>'},
    {href:'compare.html',label:'Compare',icon:'<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>'},
    {href:'physics.html',label:'Physics',icon:'<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>'},
  ];
  const nav=document.createElement('nav');
  nav.className='topnav';
  nav.innerHTML='<div class="nav-brand">AERO<span>SIM v3</span></div><div class="nav-links">'+
    pages.map(p=>`<a class="nav-link${p.href===active?' active':''}" href="${p.href}"><svg viewBox="0 0 24 24">${p.icon}</svg>${p.label}</a>`).join('')+
    '</div>';
  document.body.insertBefore(nav,document.body.firstChild);
}


function buildNav(active){
  const pages=[
    {href:'index.html',label:'Dashboard',icon:'<polyline points="3 9 12 2 21 9"/><path d="M9 22V12h6v10"/><rect x="3" y="9" width="18" height="13" rx="1"/>'},
    {href:'simulate.html',label:'Simulate',icon:'<circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>'},
    {href:'parts.html',label:'Parts',icon:'<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>'},
    {href:'compare.html',label:'Compare',icon:'<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>'},
    {href:'physics.html',label:'Physics',icon:'<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>'},
  ];
  const nav=document.createElement('nav');nav.className='topnav';
  nav.innerHTML='<div class="nav-brand">AERO<span>SIM v3</span></div><div class="nav-links">'+
    pages.map(p=>`<a class="nav-link${p.href===active?' active':''}" href="${p.href}"><svg viewBox="0 0 24 24">${p.icon}</svg>${p.label}</a>`).join('')+'</div>';
  document.body.insertBefore(nav,document.body.firstChild);
}
buildNav('compare.html');
const COLS=['#00d2ff','#00ff9d','#ffd166','#ff6b35','#ff4500','#c084fc'];
let sel=[];
function renderChips(){
  const parts=Store.getAll();
  document.getElementById('allChips').innerHTML=parts.map(p=>{
    const on=sel.includes(p.id);
    return `<span class="chip${on?' on':''}" onclick="togSel('${p.id}')">${p.name}${on?`<span class="xb" onclick="event.stopPropagation();togSel('${p.id}')">&#215;</span>`:''}</span>`;
  }).join('');
  document.getElementById('selCnt').textContent=sel.length;
}
function togSel(id){if(sel.includes(id))sel=sel.filter(s=>s!==id);else if(sel.length<6)sel.push(id);renderChips();renderCmp();}
function renderCmp(){
  const parts=sel.map(id=>Store.getById(id)).filter(Boolean);
  const metrics=[
    {k:'Cd',lbl:'Drag Cd',best:'min'},{k:'Cl',lbl:'Lift Cl',best:'max'},
    {k:'LD',lbl:'L/D',best:'max'},{k:'Nu',lbl:'Nusselt',best:'max'},
    {k:'Tmax',lbl:'T max °C',best:'min'},{k:'qpp',lbl:'Heat flux',best:'min'},
    {k:'Mach',lbl:'Mach',best:null},{k:'Re',lbl:'Reynolds',best:null},
  ];
  const bests={};
  metrics.forEach(m=>{if(!m.best)return;const vals=parts.map(p=>p[m.k]||0);bests[m.k]=m.best==='min'?Math.min(...vals):Math.max(...vals);});
  document.getElementById('cmpGrid').innerHTML=parts.map((p,ci)=>{
    const isBest=p.Cd===bests['Cd']&&parts.length>1;
    const rows=metrics.map(m=>{
      const v=p[m.k];const disp=m.k==='Re'&&v>1000?((v/1000).toFixed(0)+'k'):m.k==='qpp'?fmtI(v):(v===undefined?'—':fmt3(v));
      const cls=m.best&&v!==undefined&&v===bests[m.k]?'bv':m.best&&parts.length>1&&v!==undefined&&v===(m.best==='min'?Math.max(...parts.map(p2=>p2[m.k]||0)):Math.min(...parts.map(p2=>p2[m.k]||0)))?'wv':'';
      return `<div class="cr"><span class="cl">${m.lbl}</span><span class="cv ${cls}">${disp}</span></div>`;
    }).join('');
    return `<div class="cc${isBest?' best':''}">${isBest?'<div class="bb">Best Cd</div>':''}
      <div style="display:flex;align-items:center;gap:5px;margin-bottom:2px;"><div style="width:7px;height:7px;border-radius:50%;background:${COLS[ci]};flex-shrink:0;"></div><div class="cn">${p.name}</div></div>
      <div class="cs">${p.shape||'—'} · ${p.speed||0} m/s · AoA ${p.aoa||0}°</div>
      ${rows}
      <button class="btn primary sm" style="width:100%;margin-top:9px;" onclick="localStorage.setItem('aerosim_loadpart','${p.id}');location.href='simulate.html'">Open in Sim</button>
    </div>`;
  }).join('')||'<div style="color:var(--text2);font-size:11px;padding:18px;">Select parts above to compare.</div>';
  drawBar(parts);drawHeat(parts);drawScat(parts);
}
function drawBar(parts){
  const cv=document.getElementById('barCv');cv.width=cv.offsetWidth*(window.devicePixelRatio||1);
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);
  if(!parts.length)return;
  const flds=['Cd','Cl','LD'];
  const mx={Cd:Math.max(...parts.map(p=>p.Cd||0),.5),Cl:Math.max(...parts.map(p=>p.Cl||0),.5),LD:Math.max(...parts.map(p=>p.LD||0),20)};
  const bw=Math.floor((W/flds.length-12)/Math.max(parts.length,1));
  flds.forEach((f,fi)=>{
    const gx=fi*(W/flds.length);
    parts.forEach((p,pi)=>{const v=(p[f]||0)/mx[f];const x=gx+pi*(bw+2)+6;const bh=Math.max(2,v*(H-20));ctx.fillStyle=COLS[pi];ctx.fillRect(x,H-bh-12,bw,bh);});
    ctx.fillStyle='rgba(74,106,122,.6)';ctx.font='9px Share Tech Mono';ctx.textAlign='center';ctx.fillText(f,gx+W/flds.length/2,H-2);
  });
  parts.forEach((p,i)=>{ctx.fillStyle=COLS[i];ctx.fillRect(i*60+4,4,7,7);ctx.fillStyle='rgba(200,220,230,.6)';ctx.font='8px Share Tech Mono';ctx.textAlign='left';ctx.fillText(p.name.slice(0,8),i*60+13,11);});
}
function drawHeat(parts){
  const cv=document.getElementById('heatCv');cv.width=cv.offsetWidth*(window.devicePixelRatio||1);
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);
  if(!parts.length)return;
  const flds=['qpp','Nu','Tmax'];
  const mx={qpp:Math.max(...parts.map(p=>p.qpp||0),1000),Nu:Math.max(...parts.map(p=>p.Nu||0),200),Tmax:Math.max(...parts.map(p=>p.Tmax||0),100)};
  const bw=Math.floor((W/flds.length-12)/Math.max(parts.length,1));
  flds.forEach((f,fi)=>{
    const gx=fi*(W/flds.length);
    parts.forEach((p,pi)=>{const v=(p[f]||0)/mx[f];const x=gx+pi*(bw+2)+6;const bh=Math.max(2,v*(H-20));ctx.fillStyle=COLS[pi];ctx.globalAlpha=0.82;ctx.fillRect(x,H-bh-12,bw,bh);ctx.globalAlpha=1;});
    ctx.fillStyle='rgba(74,106,122,.6)';ctx.font='9px Share Tech Mono';ctx.textAlign='center';ctx.fillText(f,gx+W/flds.length/2,H-2);
  });
  parts.forEach((p,i)=>{ctx.fillStyle=COLS[i];ctx.fillRect(i*60+4,4,7,7);ctx.fillStyle='rgba(200,220,230,.6)';ctx.font='8px Share Tech Mono';ctx.textAlign='left';ctx.fillText(p.name.slice(0,8),i*60+13,11);});
}
function drawScat(parts){
  const cv=document.getElementById('scatCv');cv.width=cv.offsetWidth*(window.devicePixelRatio||1);
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);
  const all=Store.getAll();if(!all.length)return;
  const mxCd=Math.max(...all.map(p=>p.Cd||0),.5);
  const mxLD=Math.max(...all.map(p=>p.LD||0),20);
  all.forEach(p=>{const x=(p.Cd||0)/mxCd*(W-30)+10;const y=H-10-(p.LD||0)/mxLD*(H-20);ctx.fillStyle='rgba(74,106,122,.3)';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();});
  parts.forEach((p,i)=>{const x=(p.Cd||0)/mxCd*(W-30)+10;const y=H-10-(p.LD||0)/mxLD*(H-20);ctx.fillStyle=COLS[i];ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(200,220,230,.8)';ctx.font='9px Share Tech Mono';ctx.textAlign='left';ctx.fillText(p.name.slice(0,10),x+8,y+3);});
  ctx.strokeStyle='rgba(0,210,255,.1)';ctx.setLineDash([4,4]);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(10,H-10);ctx.lineTo(W-10,10);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='rgba(74,106,122,.4)';ctx.font='9px Share Tech Mono';ctx.textAlign='right';ctx.fillText('Cd →',W-2,H-2);ctx.textAlign='left';ctx.fillText('L/D ↑',2,12);
}
const ip=Store.getAll().slice(0,3);sel=ip.map(p=>p.id);renderChips();renderCmp();
window.addEventListener('aerosim:update',()=>{renderChips();renderCmp();});
</script>
