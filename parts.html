<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AeroSim — Parts</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
/* shared_inline.css — paste into every page's <style> block */

:root {
  --bg: #07090d;
  --bg2: #0c1018;
  --bg3: #111820;
  --panel: #090d13;
  --border: rgba(0,210,255,0.10);
  --border2: rgba(0,210,255,0.22);
  --acc: #00d2ff;
  --acc2: #00ff9d;
  --acc3: #ff6b35;
  --warn: #ffd166;
  --heat: #ff4500;
  --text: #c8dde8;
  --text2: #4a6a7a;
  --text3: #1e3040;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Syne', sans-serif;
  --nav-h: 48px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 12px; display: flex; flex-direction: column; overflow: hidden; }

/* TOP NAV */
.topnav {
  height: var(--nav-h);
  flex-shrink: 0;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 0;
  z-index: 100;
}
.nav-brand {
  font-family: var(--sans);
  font-weight: 800;
  font-size: 15px;
  color: var(--acc);
  letter-spacing: .06em;
  margin-right: 28px;
  white-space: nowrap;
}
.nav-brand span { color: var(--text2); font-weight: 400; font-size: 10px; margin-left: 6px; }
.nav-links { display: flex; gap: 2px; flex: 1; }
.nav-link {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 5px;
  text-decoration: none;
  color: var(--text2);
  font-size: 10px;
  letter-spacing: .06em;
  text-transform: uppercase;
  transition: all .15s;
  border: 1px solid transparent;
  white-space: nowrap;
}
.nav-link svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.nav-link:hover { color: var(--text); background: rgba(0,210,255,.05); border-color: var(--border); }
.nav-link.active { color: var(--acc); background: rgba(0,210,255,.09); border-color: var(--border2); }

/* PAGE SHELL */
.page { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
  flex-shrink: 0;
}
.page-title { font-family: var(--sans); font-weight: 800; font-size: 15px; color: var(--text); }
.page-title span { color: var(--acc); }
.page-body { flex: 1; overflow-y: auto; padding: 18px 20px; }
.page-body::-webkit-scrollbar { width: 3px; }
.page-body::-webkit-scrollbar-thumb { background: var(--border2); }

/* CARDS */
.card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
.card-title {
  font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--text2); margin-bottom: 11px;
  display: flex; align-items: center; gap: 5px;
}
.card-title::before { content: ''; display: inline-block; width: 2px; height: 9px; background: var(--acc); border-radius: 2px; }
.card-title.heat::before { background: var(--heat); }
.card-title.ok::before { background: var(--acc2); }
.card-title.warn::before { background: var(--warn); }

/* BADGES */
.badge { padding: 2px 8px; border-radius: 3px; font-size: 8px; letter-spacing: .1em; text-transform: uppercase; font-weight: 600; display: inline-block; }
.badge.run  { background: rgba(0,255,157,.1); color: var(--acc2); border: 1px solid rgba(0,255,157,.25); }
.badge.stop { background: rgba(255,107,53,.1); color: var(--acc3); border: 1px solid rgba(255,107,53,.25); }
.badge.cmp  { background: rgba(0,210,255,.1); color: var(--acc); border: 1px solid rgba(0,210,255,.25); }
.badge.warn { background: rgba(255,209,102,.1); color: var(--warn); border: 1px solid rgba(255,209,102,.25); }

/* BUTTONS */
.btn { padding: 7px 14px; border-radius: 5px; border: 1px solid var(--border2); background: transparent; color: var(--text); cursor: pointer; font-family: var(--mono); font-size: 10px; letter-spacing: .07em; text-transform: uppercase; transition: all .15s; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
.btn:hover { background: rgba(0,210,255,.07); border-color: var(--acc); color: var(--acc); }
.btn.primary { background: rgba(0,255,157,.1); color: var(--acc2); border-color: rgba(0,255,157,.3); }
.btn.primary:hover { background: rgba(0,255,157,.18); }
.btn.danger { background: rgba(255,107,53,.08); color: var(--acc3); border-color: rgba(255,107,53,.25); }
.btn.danger:hover { background: rgba(255,107,53,.16); }
.btn.sm { padding: 4px 10px; font-size: 9px; }

/* FORM ELEMENTS */
input[type=range] { width: 100%; -webkit-appearance: none; height: 2px; background: var(--bg3); border-radius: 2px; outline: none; cursor: pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 11px; height: 11px; border-radius: 50%; background: var(--acc); cursor: pointer; }
input[type=range]::-webkit-slider-runnable-track { background: linear-gradient(to right, var(--acc) var(--p,50%), var(--bg3) var(--p,50%)); height: 2px; border-radius: 2px; }
input[type=range].hs::-webkit-slider-thumb { background: var(--heat); }
input[type=range].hs::-webkit-slider-runnable-track { background: linear-gradient(to right, var(--heat) var(--p,50%), var(--bg3) var(--p,50%)); }
input[type=text], input[type=number], select, textarea { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--mono); font-size: 11px; padding: 6px 10px; outline: none; transition: border-color .15s; width: 100%; }
input:focus, select:focus, textarea:focus { border-color: var(--acc); }
select option { background: var(--bg2); }

/* UPLOAD ZONE */
.upload-zone { border: 1px dashed rgba(0,210,255,.25); border-radius: 7px; padding: 22px 16px; text-align: center; cursor: pointer; transition: all .2s; background: rgba(0,210,255,.02); }
.upload-zone:hover, .upload-zone.drag { border-color: var(--acc); background: rgba(0,210,255,.06); }
.upload-zone input { display: none; }

/* TABLE */
.data-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.data-table th { text-align: left; font-size: 8px; letter-spacing: .1em; text-transform: uppercase; color: var(--text2); padding: 6px 10px; border-bottom: 1px solid var(--border); }
.data-table td { padding: 7px 10px; border-bottom: 1px solid rgba(0,210,255,.05); color: var(--text); }
.data-table tr:hover td { background: rgba(0,210,255,.03); }

/* METRIC BOX */
.mbox { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 9px 12px; }
.mbox-lbl { font-size: 8px; text-transform: uppercase; letter-spacing: .1em; color: var(--text2); margin-bottom: 2px; }
.mbox-val { font-size: 19px; font-family: var(--sans); font-weight: 700; color: var(--acc); line-height: 1.1; }
.mbox-val.ok { color: var(--acc2); } .mbox-val.hot { color: var(--heat); } .mbox-val.warn { color: var(--warn); }
.mbox-unit { font-size: 9px; color: var(--text2); margin-top: 1px; }
.mbar-w { margin-top: 5px; height: 2px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.mbar { height: 100%; border-radius: 2px; background: var(--acc); transition: width .35s; }
.mbar.d { background: var(--acc3); } .mbar.h { background: var(--heat); } .mbar.w { background: var(--warn); } .mbar.ok { background: var(--acc2); }

::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

body{overflow:auto;}
.pl{display:grid;grid-template-columns:260px 1fr;gap:13px;}
.plist{display:flex;flex-direction:column;gap:5px;max-height:calc(100vh - 130px);overflow-y:auto;}
.plist::-webkit-scrollbar{width:2px;}
.pc{background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:9px 11px;cursor:pointer;transition:all .15s;}
.pc:hover{border-color:rgba(0,210,255,.28);}
.pc.sel{border-color:var(--acc);background:rgba(0,210,255,.06);}
.pc-name{font-size:11px;color:var(--text);margin-bottom:2px;display:flex;align-items:center;gap:5px;}
.pc-meta{font-size:9px;color:var(--text2);}
.dg{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px;}
.pt{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(0,210,255,.05);font-size:10px;}
.pt:last-child{border:none;}
.pt-l{color:var(--text2);}.pt-v{color:var(--text);}
.tag{display:inline-block;padding:2px 5px;border-radius:2px;font-size:8px;letter-spacing:.06em;text-transform:uppercase;margin-right:2px;}
.tag.ok{background:rgba(0,255,157,.1);color:var(--acc2);border:1px solid rgba(0,255,157,.2);}
.tag.hot{background:rgba(255,69,0,.1);color:var(--heat);border:1px solid rgba(255,69,0,.2);}
.tag.cd{background:rgba(0,210,255,.1);color:var(--acc);border:1px solid rgba(0,210,255,.2);}
.srch{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:11px;padding:5px 9px;outline:none;margin-bottom:7px;}
.srch:focus{border-color:var(--acc);}
.sb{display:flex;gap:5px;margin-bottom:7px;align-items:center;font-size:9px;color:var(--text2);}
.sbb{padding:3px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;cursor:pointer;font-size:9px;color:var(--text2);font-family:var(--mono);transition:all .12s;}
.sbb:hover,.sbb.on{border-color:var(--acc);color:var(--acc);}
.ntxt{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:11px;padding:8px 10px;resize:none;outline:none;}
.ntxt:focus{border-color:var(--acc);}

.sel-bar{display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(0,210,255,.07);border:1px solid var(--acc);border-radius:5px;margin-bottom:7px;font-size:10px;color:var(--acc);}
.sel-bar button{padding:3px 9px;background:rgba(255,107,53,.12);color:var(--acc3);border:1px solid rgba(255,107,53,.3);border-radius:3px;cursor:pointer;font-family:var(--mono);font-size:9px;letter-spacing:.06em;}
.sel-bar button:hover{background:rgba(255,107,53,.22);}
.sel-bar .cnt{flex:1;}
.pc .chk{width:14px;height:14px;flex-shrink:0;accent-color:var(--acc);cursor:pointer;}
</style>
</head>
<body>
<div class="page">
<div class="page-header">
  <div class="page-title"><span>Aero</span>Sim &mdash; Parts Library</div>
  <div style="display:flex;gap:7px;">
    <button class="btn sm" onclick="expAll()">&#8675; Export JSON</button>
    <button class="btn sm" onclick="document.getElementById('impIn').click()">&#8673; Import JSON</button>
    <input type="file" id="impIn" accept=".json" style="display:none" onchange="doImport(this.files[0])">
    <a href="simulate.html" class="btn primary sm">+ New Run</a>
  </div>
</div>
<div class="page-body">
<div class="pl">
  <div>
    <input class="srch" id="srch" placeholder="Search parts..." oninput="renderList()">
    <div id="selBar" style="display:none;" class="sel-bar">
  <span class="cnt"><span id="selCnt">0</span> selected</span>
  <button onclick="deleteSelected()">&#8722; Delete selected</button>
  <button onclick="clearSel()" style="background:rgba(0,210,255,.1);color:var(--acc);border-color:var(--acc);">Clear</button>
</div>
<div class="sb">Sort:
      <button class="sbb on" id="sb_date" onclick="setSort('date',this)">Date</button>
      <button class="sbb" id="sb_cd" onclick="setSort('cd',this)">Cd</button>
      <button class="sbb" id="sb_ld" onclick="setSort('ld',this)">L/D</button>
      <button class="sbb" id="sb_name" onclick="setSort('name',this)">Name</button>
    </div>
    <div class="plist" id="plist"></div>
    <div style="margin-top:6px;font-size:9px;color:var(--text2);" id="lcount"></div>
  </div>
  <div id="det" style="overflow-y:auto;">
    <div id="empty" style="display:flex;align-items:center;justify-content:center;height:280px;color:var(--text2);font-size:11px;">Select a part to view details</div>
    <div id="detcon" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div>
          <div style="font-family:var(--sans);font-size:17px;font-weight:800;color:var(--text);" id="dName">&mdash;</div>
          <div style="font-size:10px;color:var(--text2);margin-top:1px;" id="dMeta">&mdash;</div>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn primary sm" onclick="loadSim()">Open in Sim</button>
          <a href="compare.html" class="btn sm">Compare</a>
          <button class="btn danger sm" onclick="delPart()">Delete</button>
        </div>
      </div>
      <div class="dg">
        <div class="mbox"><div class="mbox-lbl">Cd</div><div class="mbox-val" id="dCd">&mdash;</div><div class="mbox-unit">drag</div></div>
        <div class="mbox"><div class="mbox-lbl">Cl</div><div class="mbox-val" id="dCl">&mdash;</div><div class="mbox-unit">lift</div></div>
        <div class="mbox"><div class="mbox-lbl">L/D</div><div class="mbox-val" id="dLD">&mdash;</div><div class="mbox-unit">efficiency</div></div>
        <div class="mbox"><div class="mbox-lbl">Reynolds</div><div class="mbox-val" id="dRe">&mdash;</div><div class="mbox-unit">regime</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
        <div class="card">
          <div class="card-title">Parameters</div>
          <div id="ptable"></div>
        </div>
        <div class="card">
          <div class="card-title heat">Thermal</div>
          <canvas id="thChart" width="200" height="100" style="width:100%;display:block;"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Notes</div>
        <textarea class="ntxt" id="dNotes" rows="3" placeholder="Engineering notes..." oninput="saveNotes()"></textarea>
      </div>
    </div>
  </div>
</div>
</div>
</div>
<script>

const DB_KEY='aerosim_parts';
const Store={
  getAll(){try{return JSON.parse(localStorage.getItem(DB_KEY)||'[]');}catch{return [];}},
  save(p){localStorage.setItem(DB_KEY,JSON.stringify(p));window.dispatchEvent(new Event('aerosim:update'));},
  deleteById(id){this.save(this.getAll().filter(p=>p.id!==id));},
  getById(id){return this.getAll().find(p=>p.id===id)||null;}
};
const fmt3=v=>(v===undefined||v===null||isNaN(v))?'—':(+v).toFixed(3);
const fmt1=v=>(v===undefined||v===null||isNaN(v))?'—':(+v).toFixed(1);
const fmtI=v=>(v===undefined||v===null||isNaN(v))?'—':Math.round(+v).toLocaleString();

function buildNav(active){
  const pages=[
    {href:'index.html',label:'Dashboard',icon:'<polyline points="3 9 12 2 21 9"/><path d="M9 22V12h6v10"/><rect x="3" y="9" width="18" height="13" rx="1"/>'},
    {href:'simulate.html',label:'Simulate',icon:'<circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>'},
    {href:'parts.html',label:'Parts',icon:'<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>'},
    {href:'compare.html',label:'Compare',icon:'<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>'},
    {href:'physics.html',label:'Physics',icon:'<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>'},
  ];
  const nav=document.createElement('nav');
  nav.className='topnav';
  nav.innerHTML='<div class="nav-brand">AERO<span>SIM v3</span></div><div class="nav-links">'+
    pages.map(p=>`<a class="nav-link${p.href===active?' active':''}" href="${p.href}"><svg viewBox="0 0 24 24">${p.icon}</svg>${p.label}</a>`).join('')+
    '</div>';
  document.body.insertBefore(nav,document.body.firstChild);
}


let selSet = new Set();

function handleCardClick(e, id) {
  // If click was on checkbox, let toggleCheck handle it
  if (e.target.type === 'checkbox') return;
  selPart(id);
}

function toggleCheck(id, el) {
  if (el.checked) selSet.add(id);
  else selSet.delete(id);
  updateSelBar();
}

function updateSelBar() {
  const bar = document.getElementById('selBar');
  const cnt = document.getElementById('selCnt');
  cnt.textContent = selSet.size;
  bar.style.display = selSet.size > 0 ? 'flex' : 'none';
}

function clearSel() {
  selSet.clear();
  updateSelBar();
  renderList();
}

function deleteSelected() {
  if (!selSet.size) return;
  const names = [...selSet].map(id => Store.getById(id)?.name || id).join(', ');
  if (!confirm('Delete ' + selSet.size + ' parts?\n' + names)) return;
  selSet.forEach(id => Store.deleteById(id));
  if (selSet.has(selId)) {
    selId = null;
    document.getElementById('empty').style.display = '';
    document.getElementById('detcon').style.display = 'none';
  }
  selSet.clear();
  updateSelBar();
  renderList();
}

buildNav('parts.html');
let selId=null,sortBy='date';
function setSort(s,el){sortBy=s;document.querySelectorAll('.sbb').forEach(b=>b.classList.remove('on'));el.classList.add('on');renderList();}
function renderList(){
  const q=document.getElementById('srch').value.toLowerCase();
  let parts=Store.getAll().filter(p=>(p.name||'').toLowerCase().includes(q)||(p.shape||'').toLowerCase().includes(q));
  if(sortBy==='cd')parts.sort((a,b)=>(a.Cd||9)-(b.Cd||9));
  else if(sortBy==='ld')parts.sort((a,b)=>(b.LD||0)-(a.LD||0));
  else if(sortBy==='name')parts.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  else parts.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  document.getElementById('lcount').textContent=parts.length+' parts';
  document.getElementById('plist').innerHTML=parts.map(p=>{
    const cd=p.Cd||0;
    const checked=selSet.has(p.id)?'checked':'';
    return `<div class="pc${p.id===selId?' sel':''}" style="display:flex;align-items:flex-start;gap:7px;" onclick="handleCardClick(event,'${p.id}')">
      <input type="checkbox" class="chk" ${checked} onclick="event.stopPropagation();toggleCheck('${p.id}',this)" style="margin-top:2px;">
      <div style="flex:1;min-width:0;">
        <div class="pc-name">${p.name||'unnamed'}<span class="tag cd">Cd ${fmt3(cd)}</span>${p.qpp>1500?'<span class="tag hot">hot</span>':''}${cd<.05?'<span class="tag ok">low drag</span>':''}</div>
        <div class="pc-meta">${p.shape||'—'} | ${p.speed||0} m/s | L/D ${fmt1(p.LD)}</div>
      </div>
    </div>`;
  }).join('');
}
function selPart(id){
  selId=id;renderList();
  const p=Store.getById(id);if(!p)return;
  document.getElementById('empty').style.display='none';
  document.getElementById('detcon').style.display='';
  document.getElementById('dName').textContent=p.name||'unnamed';
  document.getElementById('dMeta').textContent=(p.shape||'—')+' · '+(p.speed||0)+' m/s · AoA '+(p.aoa||0)+'° · '+new Date(p.createdAt).toLocaleDateString();
  document.getElementById('dCd').textContent=fmt3(p.Cd);
  document.getElementById('dCl').textContent=fmt3(p.Cl);
  document.getElementById('dLD').textContent=fmt1(p.LD);
  document.getElementById('dRe').textContent=p.Re>1000?((p.Re/1000).toFixed(0)+'k'):fmtI(p.Re);
  document.getElementById('ptable').innerHTML=[
    ['Shape',p.shape||'—'],['Speed',(p.speed||0)+' m/s'],['AoA',(p.aoa||0)+'°'],
    ['Density',(p.den||1.225)+' kg/m³'],['T wall',(p.tw||80)+'°C'],
    ['Nu',fmt1(p.Nu)],['q″',fmtI(p.qpp)+' W/m²'],['Mach',fmt3(p.Mach)]
  ].map(([l,v])=>`<div class="pt"><span class="pt-l">${l}</span><span class="pt-v">${v}</span></div>`).join('');
  document.getElementById('dNotes').value=p.notes||'';
  drawThermal(p);
}
function drawThermal(p){
  const cv=document.getElementById('thChart');
  cv.width=cv.offsetWidth*(window.devicePixelRatio||1);
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#111820';ctx.fillRect(0,0,W,H);
  [{v:p.qpp||0,max:3000,col:'#ff4500',lbl:'q″'},{v:p.Nu||0,max:300,col:'#ffd166',lbl:'Nu'},{v:p.Tmax||0,max:200,col:'#ff8c42',lbl:'Tmax'}].forEach((f,i)=>{
    const bh=16,y=i*(bh+8)+8,w=Math.min((f.v/f.max)*((W-60)),W-60);
    ctx.fillStyle='#1a2a30';ctx.fillRect(50,y,W-60,bh);
    ctx.fillStyle=f.col;ctx.fillRect(50,y,Math.max(w,0),bh);
    ctx.fillStyle='rgba(200,220,230,.7)';ctx.font='8px Share Tech Mono';
    ctx.fillText(f.lbl,2,y+bh/2+3);ctx.fillText(Math.round(f.v),52+Math.max(w,0),y+bh/2+3);
  });
}
function saveNotes(){if(!selId)return;const parts=Store.getAll();const p=parts.find(p=>p.id===selId);if(p){p.notes=document.getElementById('dNotes').value;Store.save(parts);}}
function loadSim(){if(selId){localStorage.setItem('aerosim_loadpart',selId);location.href='simulate.html';}}
function delPart(){if(!selId)return;const p=Store.getById(selId);if(!confirm('Delete '+(p&&p.name||'this part')+'?'))return;Store.deleteById(selId);selId=null;document.getElementById('empty').style.display='';document.getElementById('detcon').style.display='none';renderList();}
function expAll(){const b=new Blob([JSON.stringify(Store.getAll(),null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='aerosim_parts.json';a.click();}
function doImport(file){const r=new FileReader();r.readAsText(file);r.onload=function(e){try{const d=JSON.parse(e.target.result);if(!Array.isArray(d))throw new Error('Expected array');const ex=Store.getAll();d.forEach(function(p){if(!ex.find(function(e){return e.id===p.id;}))ex.push(p);});Store.save(ex);renderList();alert('Imported '+d.length+' parts.');}catch(err){alert('Import error: '+err.message);}};}
window.addEventListener('aerosim:update',renderList);
renderList();
</script>
